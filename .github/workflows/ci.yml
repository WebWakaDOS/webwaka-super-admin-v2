name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Frontend type-check + build ────────────────────────────────────────────
  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-store-frontend-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-frontend-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: https://webwaka-super-admin-api-staging.webwaka.workers.dev

  # ── Workers type-check + unit tests ────────────────────────────────────────
  workers:
    name: Workers (type-check + unit tests)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: workers

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: workers/pnpm-lock.yaml

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: pnpm-store-workers-${{ runner.os }}-${{ hashFiles('workers/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-workers-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Unit tests (Vitest)
        run: npx vitest run
        env:
          NODE_ENV: test

  # ── Security audit + scan ───────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit frontend dependencies
        run: |
          cd frontend && pnpm install --frozen-lockfile && pnpm audit --audit-level=high
        continue-on-error: true

      - name: Audit workers dependencies
        run: |
          cd workers && pnpm install --frozen-lockfile && pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for hardcoded secrets (gitleaks scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ── Playwright E2E tests ────────────────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    # Only run E2E when PLAYWRIGHT_BASE_URL is configured
    if: vars.PLAYWRIGHT_BASE_URL != ''

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm exec playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Deploy to staging (only on master merges) ──────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [frontend, workers]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: pnpm add -g wrangler

      # ── D1 backup before applying any migrations ────────────────────────────
      - name: Backup D1 databases (staging)
        run: |
          echo "Creating D1 backup snapshots before deploy…"
          for DB_NAME in webwaka-tenant-db webwaka-billing-db webwaka-health-db webwaka-rbac-db; do
            wrangler d1 export "${DB_NAME}" \
              --env staging \
              --output "/tmp/${DB_NAME}-$(date +%Y%m%d%H%M%S).sql" \
              || echo "Warning: backup of ${DB_NAME} skipped (may not exist yet)"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true

      - name: Deploy Workers to staging
        run: |
          cd workers
          pnpm install --frozen-lockfile
          wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build
        env:
          VITE_API_URL: https://webwaka-super-admin-api-staging.webwaka.workers.dev

      - name: Deploy frontend to Cloudflare Pages (staging)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: webwaka-super-admin
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: staging

      # ── Post-deploy health check ────────────────────────────────────────────
      - name: Post-deploy health check
        run: |
          STAGING_URL="https://webwaka-super-admin-api-staging.webwaka.workers.dev"
          echo "Checking ${STAGING_URL}/health …"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/health" --max-time 10)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP ${STATUS})"
              exit 0
            fi
            echo "Attempt ${i}/5 — HTTP ${STATUS} — retrying in 10s…"
            sleep 10
          done
          echo "Health check FAILED after 5 attempts — investigate ${STAGING_URL}/health"
          exit 1
        continue-on-error: true
