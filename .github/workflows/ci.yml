name: CI

on:
  push:
    branches: [master, develop, "feature/**", "fix/**", "chore/**"]
  pull_request:
    branches: [master, develop]

jobs:
  # ── Frontend type-check + build ────────────────────────────────────────────
  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: https://webwaka-super-admin-api-staging.webwaka.workers.dev

  # ── Workers type-check ─────────────────────────────────────────────────────
  workers:
    name: Workers (type-check)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: workers

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: workers/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

  # ── Security audit ──────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit frontend dependencies
        run: |
          cd frontend && pnpm install --frozen-lockfile && pnpm audit --audit-level=high
        continue-on-error: true

      - name: Audit workers dependencies
        run: |
          cd workers && pnpm install --frozen-lockfile && pnpm audit --audit-level=high
        continue-on-error: true

  # ── Deploy to staging (only on master merges) ──────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [frontend, workers]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: pnpm add -g wrangler

      - name: Deploy Workers to staging
        run: |
          cd workers
          pnpm install --frozen-lockfile
          wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build
        env:
          VITE_API_URL: https://webwaka-super-admin-api-staging.webwaka.workers.dev

      - name: Deploy frontend to Cloudflare Pages (staging)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: webwaka-super-admin
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: staging
