name: Deploy Frontend

on:
  push:
    branches:
      - master
      - main
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  # ============================================================================
  # LINTING AND TESTING
  # ============================================================================
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'


      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Run linting
        working-directory: frontend
        run: pnpm lint || true

      - name: Run type checking
        working-directory: frontend
        run: pnpm type-check

      - name: Run tests
        working-directory: frontend
        run: pnpm test || true

  # ============================================================================
  # PRODUCTION DEPLOYMENT
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    needs: [lint-and-test]
    permissions:
      contents: write
      releases: write
    environment:
      name: production
      url: https://master.webwaka-super-admin-ui.pages.dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'


      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Build frontend
        working-directory: frontend
        run: pnpm build
        env:
          VITE_API_URL: https://webwaka-super-admin-api.webwaka.workers.dev

      - name: Deploy to Cloudflare Pages (Production)
        working-directory: frontend
        run: npx wrangler pages deploy dist --project-name=webwaka-super-admin-ui --branch=master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          sleep 10
          curl -f https://master.webwaka-super-admin-ui.pages.dev || exit 1

      - name: Create GitHub Release
        continue-on-error: true
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Deployed Frontend to production
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false

  # ============================================================================
  # STAGING DEPLOYMENT
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    needs: [lint-and-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'


      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Build frontend
        working-directory: frontend
        run: pnpm build
        env:
          VITE_API_URL: https://webwaka-super-admin-api-staging.webwaka.workers.dev

      - name: Deploy to Cloudflare Pages (Staging)
        working-directory: frontend
        run: npx wrangler pages deploy dist --project-name=webwaka-super-admin-ui --branch=staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment (Staging)
        run: |
          sleep 10
          curl -f https://staging.webwaka-super-admin-ui.pages.dev || exit 1
