name: Deploy Workers API

on:
  push:
    branches:
      - master
      - main
      - develop
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  # ============================================================================
  # LINTING AND TESTING
  # ============================================================================
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (root workspace — installs all packages incl. workers)
        run: pnpm install --shamefully-hoist

      - name: Run linting
        working-directory: workers
        run: pnpm lint || true

      - name: Run type checking
        working-directory: workers
        run: pnpm type-check || true

      - name: Run tests
        working-directory: workers
        run: pnpm test || true

  # ============================================================================
  # PRODUCTION DEPLOYMENT
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    needs: [lint-and-test]
    permissions:
      contents: write
    environment:
      name: production
      url: https://webwaka-super-admin-api-prod.webwaka.workers.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (root workspace — installs all packages incl. workers)
        run: pnpm install --shamefully-hoist

      - name: Deploy to Cloudflare Workers
        working-directory: workers
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          sleep 10
          curl -f https://webwaka-super-admin-api-prod.webwaka.workers.dev/health || echo "Health check failed (non-blocking)"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Deployed Workers API to production
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false

  # ============================================================================
  # STAGING DEPLOYMENT
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    needs: [lint-and-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (root workspace — installs all packages incl. workers)
        run: pnpm install --shamefully-hoist

      - name: Deploy to Cloudflare Workers (Staging)
        working-directory: workers
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment (Staging)
        run: |
          sleep 10
          curl -f https://webwaka-super-admin-api-staging.webwaka.workers.dev/health || echo "Health check failed (non-blocking)"
