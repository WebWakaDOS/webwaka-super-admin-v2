name = "webwaka-super-admin-api"
main = "src/index.ts"
compatibility_date = "2026-03-15"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# ENVIRONMENT: Staging
# ============================================================================
[env.staging]
name = "webwaka-super-admin-api-staging"
vars = { ENVIRONMENT = "staging", LOG_LEVEL = "debug", CACHE_TTL = "300" }
# JWT_SECRET must be set as an encrypted secret:
#   wrangler secret put JWT_SECRET --env staging

# D1 Database Bindings (Staging)
[[env.staging.d1_databases]]
binding = "TENANTS_DB"
database_name = "tenants_staging"
database_id = "c0fa3b4f-06cb-4fbc-a641-a7a6dd3ca026"

[[env.staging.d1_databases]]
binding = "BILLING_DB"
database_name = "billing_staging"
database_id = "660716fa-4ecd-452b-843c-0fd0fe6472e5"

[[env.staging.d1_databases]]
binding = "RBAC_DB"
database_name = "rbac_staging"
database_id = "9d6ba45a-0d99-4f10-a6d4-7c8b18bdb0ae"

[[env.staging.d1_databases]]
binding = "MODULES_DB"
database_name = "modules_staging"
database_id = "ee93377c-8000-45d6-ae54-f0d4c588bf04"

[[env.staging.d1_databases]]
binding = "HEALTH_DB"
database_name = "health_staging"
database_id = "a22ca9a2-1581-491f-90b2-826f64601c9d"

# KV Namespace Bindings (Staging)
[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
id = "3f66df9f1b2f4051a39f2a4b2b02d348"

[[env.staging.kv_namespaces]]
binding = "FEATURE_FLAGS_KV"
id = "d757ffe29c7c4c55adad5dcf5163104d"

[[env.staging.kv_namespaces]]
binding = "CACHE_KV"
id = "ff1f220b15364b2995732ac05482c3ef"

[[env.staging.kv_namespaces]]
binding = "NOTIFICATIONS_KV"
id = "4b5552f38e8b4db89e696d23129745d3"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "fffa715813364aeda8dfd697f1f33948"
# Create with: wrangler kv:namespace create RATE_LIMIT_KV --env staging

# ============================================================================
# ENVIRONMENT: Production
# ============================================================================
[env.production]
name = "webwaka-super-admin-api-prod"
vars = { ENVIRONMENT = "production", LOG_LEVEL = "info", CACHE_TTL = "3600" }
# JWT_SECRET must be set as an encrypted secret:
#   wrangler secret put JWT_SECRET --env production

# D1 Database Bindings (Production - Same as Staging for resource efficiency)
[[env.production.d1_databases]]
binding = "TENANTS_DB"
database_name = "tenants_prod"
database_id = "c0fa3b4f-06cb-4fbc-a641-a7a6dd3ca026"

[[env.production.d1_databases]]
binding = "BILLING_DB"
database_name = "billing_prod"
database_id = "660716fa-4ecd-452b-843c-0fd0fe6472e5"

[[env.production.d1_databases]]
binding = "RBAC_DB"
database_name = "rbac_prod"
database_id = "9d6ba45a-0d99-4f10-a6d4-7c8b18bdb0ae"

[[env.production.d1_databases]]
binding = "MODULES_DB"
database_name = "modules_prod"
database_id = "ee93377c-8000-45d6-ae54-f0d4c588bf04"

[[env.production.d1_databases]]
binding = "HEALTH_DB"
database_name = "health_prod"
database_id = "a22ca9a2-1581-491f-90b2-826f64601c9d"

# KV Namespace Bindings (Production)
[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "3f66df9f1b2f4051a39f2a4b2b02d348"

[[env.production.kv_namespaces]]
binding = "FEATURE_FLAGS_KV"
id = "d757ffe29c7c4c55adad5dcf5163104d"

[[env.production.kv_namespaces]]
binding = "CACHE_KV"
id = "ff1f220b15364b2995732ac05482c3ef"

[[env.production.kv_namespaces]]
binding = "NOTIFICATIONS_KV"
id = "4b5552f38e8b4db89e696d23129745d3"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "daedd783ef6d45f781752c5c9e398633"
# Create with: wrangler kv:namespace create RATE_LIMIT_KV --env production

# Build: wrangler handles bundling automatically via esbuild (no custom build command needed)
# Migrations: applied manually via wrangler d1 execute commands (multi-DB setup)

# ============================================================================
# Observability
# ============================================================================
[observability]
enabled = true
